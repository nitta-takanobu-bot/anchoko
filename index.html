    font-size:18px; margin:0; letter-spacing:.06em; color:var(--brown);
    font-weight:600; white-space:nowrap;
  }
  header h1{display:flex; flex-direction:column; line-height:1.2}
  header h1 small{font-size:10.5px;color:var(--sub);font-weight:400;margin-top:2px;letter-spacing:.02em}
  .titlewrap{display:flex; align-items:center; gap:9px; width:100%}
  .logo{flex:0 0 auto; line-height:0}
  .logo img{width:38px; height:38px; display:block; object-fit:contain}
  .search{
    flex:1; min-width:130px; max-width:300px;
    border:1px solid var(--line); border-radius:20px; padding:6px 13px;
    font-size:14px; background:#fff; color:var(--ink); font-family:inherit;
  }
  .dice{
    flex:0 0 auto; border:1px solid var(--line); background:#fff; color:var(--brown);
    border-radius:20px; padding:6px 12px; font-size:13px; cursor:pointer; font-family:inherit;
    white-space:nowrap;
  }
  .dice:hover{background:var(--brown); color:#fff}
  .tags{display:flex; flex-wrap:wrap; gap:6px; width:100%}
  .tag{
    font-size:12px; padding:3px 11px; border-radius:14px; cursor:pointer;
    border:1px solid var(--line); background:#fff; color:var(--sub); font-family:inherit;
    white-space:nowrap;
  }
  .tag.on{background:var(--brown); color:#fff; border-color:var(--brown)}

  main{flex:1; display:flex; align-items:stretch; justify-content:center; padding:10px 10px 4px; min-height:0}
  .stage{width:100%; max-width:680px; display:flex}

  /* 下の操作バー（前・めくる・次）＝親指の届く位置に集約 */
  .controls{flex:0 0 auto; width:100%; max-width:680px; margin:0 auto; display:flex; gap:9px; align-items:stretch; padding:4px 12px 8px}
  .navb{
    flex:0 0 auto; width:58px; border-radius:13px;
    border:1px solid var(--line); background:#fff; color:var(--brown);
    font-size:25px; cursor:pointer; line-height:1;
  }
  .navb:hover{background:var(--brown); color:#fff}
  .navb:disabled{opacity:.25; cursor:default; background:#fff; color:var(--brown)}

  .card{
    flex:1; background:#fff; border:1px solid var(--line); border-radius:16px;
    box-shadow:0 6px 22px rgba(80,60,40,.10);
    padding:18px 22px 16px; display:flex; flex-direction:column;
    cursor:pointer; -webkit-tap-highlight-color:transparent; user-select:none;
    min-height:0; overflow:hidden;
  }
  /* 上：分類と題 */
  .chead{flex:0 0 auto; border-bottom:1px dashed var(--line); padding-bottom:10px; margin-bottom:8px}
  .chead .cat{font-size:11.5px; font-weight:600; color:#fff; background:var(--brown); border-radius:11px; padding:2px 11px}
  .chead h2{font-size:21px; margin:8px 0 0; color:var(--ink); letter-spacing:.03em; line-height:1.35}

  /* 中：いまの一拍（大きく・中央） */
  .beat{flex:1; display:flex; flex-direction:column; justify-content:flex-start; min-height:0; overflow:auto; padding:14px 2px 6px}
  .beat .lbl{font-size:13px; letter-spacing:.12em; font-weight:700; margin-bottom:10px}
  .beat .txt{font-size:19px; line-height:2.0; color:var(--ink)}
  .beat.toi .lbl{color:var(--toi)} .beat.mikata .lbl{color:var(--mikata)}
  .beat.kizuki .lbl{color:var(--kizuki)} .beat.hitokoto .lbl{color:var(--hitokoto)}
  .beat.hitokoto .txt{background:#f1ebdd; border:1px solid #e3d8c3; border-radius:12px; padding:16px 18px; font-weight:600}

  /* 下：進み具合とヒント */
  .cfoot{flex:0 0 auto; border-top:1px dashed var(--line); padding-top:9px; margin-top:8px;
    display:flex; align-items:center; justify-content:space-between; gap:8px}
  .dots{display:flex; gap:6px}
  .dot{width:8px; height:8px; border-radius:50%; background:var(--line)}
  .dot.on{background:var(--brown)}
  .cnt{font-size:11.5px; color:var(--brown); font-weight:600}
  /* 大きな めくるボタン（下の操作バー中央） */
  .tapbtn{
    flex:1; padding:15px 14px; border-radius:13px;
    background:var(--brown); color:#fff; text-align:center;
    font-size:17px; font-weight:600; letter-spacing:.04em;
    box-shadow:0 3px 10px rgba(80,60,40,.18); cursor:pointer; user-select:none;
  }
  .tapbtn.last{background:var(--accent)}

  .empty{flex:1; display:flex; align-items:center; justify-content:center; text-align:center; color:var(--sub); font-size:15px; padding:30px}
  .ghint{flex:0 0 auto; text-align:center; padding:7px 10px 10px; font-size:11px; color:var(--sub)}

  /* ようこそ（戸口）画面 */
  #welcome{position:fixed; inset:0; z-index:9999; background:var(--paper); color:var(--ink);
    display:flex; align-items:center; justify-content:center; padding:32px 24px; overflow:auto;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;}
  #welcome .w-inner{width:100%; max-width:360px; text-align:center; display:flex; flex-direction:column; align-items:center}
  #welcome .w-logo{width:200px; height:200px; filter:drop-shadow(0 8px 16px rgba(107,79,58,.18))}
  #welcome .w-title{font-size:29px; letter-spacing:.08em; color:var(--brown); font-weight:700; line-height:1.4; margin-top:6px}
  #welcome .w-sub{font-size:14px; color:var(--sub); letter-spacing:.06em; margin-top:10px}
  #welcome .w-rule{width:48px; height:1px; background:var(--line); margin:24px 0 20px}
  #welcome .w-guide{font-size:14.5px; line-height:2.1; letter-spacing:.02em}
  #welcome .w-leave{color:var(--accent)}
  #welcome .w-start{margin-top:32px; background:var(--brown); color:#fff; font-family:inherit; font-size:17px;
    letter-spacing:.18em; border:none; border-radius:30px; padding:15px 52px;
    box-shadow:0 6px 14px rgba(107,79,58,.25); cursor:pointer}
  #welcome .w-pick{font-size:13px; color:var(--sub); margin-top:26px; letter-spacing:.08em}
  #welcome .w-doors{display:flex; flex-wrap:wrap; gap:9px; justify-content:center; margin-top:14px}
  #welcome .w-door{font-family:inherit; font-size:15px; color:var(--brown); background:#fff;
    border:1px solid var(--line); border-radius:22px; padding:10px 20px; cursor:pointer}
  #welcome .w-door:active{background:var(--brown); color:#fff}
  #welcome .w-omakase{margin-top:22px; background:var(--brown); color:#fff; font-family:inherit;
    font-size:15px; letter-spacing:.12em; border:none; border-radius:30px; padding:13px 40px;
    box-shadow:0 6px 14px rgba(107,79,58,.25); cursor:pointer}
  #welcome .w-foot{margin-top:22px; font-size:11px; color:var(--sub); letter-spacing:.08em}
</style>
</head>
<body>
<div id="welcome">
  <div class="w-inner">
    <img class="w-logo" src="kobutta.png" alt="こぶったちゃん">
    <h1 class="w-title">「こぶった」の<br>ひきだし</h1>
    <div class="w-sub">仏教の知恵と、いろんな視点を、一枚ずつ。</div>
    <div class="w-rule"></div>
    <div class="w-guide">
      タップでめくり、左右で次の札へ。順番はありません。
    </div>
    <button class="w-start" onclick="document.getElementById('welcome').style.display='none'">よ う こ そ</button>
    <div class="w-foot">佛心寺（こぶったちゃん）</div>
  </div>
</div>
<div class="brandbar">
  <span class="bn">佛心寺（こぶったちゃん）</span>
  <span>© 2026 新田崇信　<a href="https://busshinji.net" target="_blank" rel="noopener">busshinji.net</a></span>
</div>
<header>
  <div class="titlewrap">
    <span class="logo"><img src="kobutta.png" alt="こぶったちゃん"></span>
    <h1>「こぶった」のひきだし<small>仏教思想と、いろんな視点</small></h1>
  </div>
  <input class="search" id="search" placeholder="ことばで探す（例：無常）" autocomplete="off">
  <button class="dice" id="dice" title="ランダムで1枚">🎲 今日の一枚</button>
  <div class="tags" id="tags"></div>
</header>

<main>
  <div class="stage">
    <div id="slot" style="flex:1; display:flex"></div>
  </div>
</main>
<div class="controls">
  <button class="navb" id="prev" title="前の札（←）">‹</button>
  <div class="tapbtn" id="tapbtn">▾ つづきをめくる</div>
  <button class="navb" id="next" title="次の札（→）">›</button>
</div>
<div class="ghint">中央ボタンで続き　・　◀ ▶ で次の札　・　🎲で今日の一枚</div>

<script>
const ALL = window.CARDS || [];
let view = ALL.slice();
let idx = 0;     // 何枚目（view内）
let beat = 0;    // その札の何拍目
let activeCat = null;
let query = "";

const slot = document.getElementById("slot");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function nl(s){return esc(s).replace(/\n/g,"<br>");}

// 表示順（届けたい順。一覧に無いカテゴリは末尾に自動追加）
const CAT_ORDER = [
  "かなしみ・グリーフ","いのち・生死","ご縁・人とのあいだ",
  "仏教思想（ものの見方）","暮らし・はたらき","科学・別の視点","お寺のかたち"
];
function allCats(){
  const present = new Set();
  ALL.forEach(c => { if(c.category) present.add(c.category); });
  const ordered = CAT_ORDER.filter(c => present.has(c));
  present.forEach(c => { if(!ordered.includes(c)) ordered.push(c); });
  return ordered;
}
function catCount(t){ return ALL.filter(c => c.category===t).length; }
function renderTags(){
  const box = document.getElementById("tags");
  box.innerHTML = "";
  allCats().forEach(t => {
    const el = document.createElement("span");
    el.className = "tag" + (activeCat===t ? " on":"");
    el.textContent = t + " " + catCount(t);
    el.onclick = () => { activeCat = (activeCat===t)?null:t; applyFilter(); };
    box.appendChild(el);
  });
}

// その札の「拍」配列（空欄は飛ばす）
function beatsOf(c){
  const b = [];
  if(c.toi)      b.push({cls:"toi",      lbl:"問い",        txt:c.toi});
  if(c.mikata)   b.push({cls:"mikata",   lbl:"見方",        txt:c.mikata});
  if(c.kizuki)   b.push({cls:"kizuki",   lbl:"気づき",      txt:c.kizuki});
  if(c.hitokoto) b.push({cls:"hitokoto", lbl:"◆ ひとこと",  txt:c.hitokoto});
  return b.length ? b : [{cls:"toi",lbl:"",txt:"（中身がまだありません）"}];
}

function render(){
  if(!view.length){
    slot.innerHTML = '<div class="card"><div class="empty">そのことばの札は、まだありません。<br>別のことばで探すか、🎲を押してみてください。</div></div>';
    prevBtn.disabled = nextBtn.disabled = true;
    return;
  }
  if(idx<0) idx=0; if(idx>=view.length) idx=view.length-1;
  const c = view[idx];
  const bs = beatsOf(c);
  if(beat<0) beat=0; if(beat>=bs.length) beat=bs.length-1;
  const cur = bs[beat];
  const last = beat>=bs.length-1;

  const dots = bs.map((_,i)=>'<span class="dot'+(i<=beat?' on':'')+'"></span>').join("");
  const lastCard = idx>=view.length-1;
  const tapLabel = !last ? "▾ つづきをめくる" : (lastCard ? "🎲 もう一枚ひく" : "› 次の札へ");

  slot.innerHTML =
    '<div class="card" id="card">'+
      '<div class="chead">'+
        (c.category?'<span class="cat">'+esc(c.category)+'</span>':'')+
        '<h2>'+esc(c.title)+'</h2>'+
      '</div>'+
      '<div class="beat '+cur.cls+'">'+
        (cur.lbl?'<div class="lbl">'+esc(cur.lbl)+'</div>':'')+
        '<div class="txt">'+nl(cur.txt)+'</div>'+
      '</div>'+
      '<div class="cfoot">'+
        '<div class="dots">'+dots+'</div>'+
        '<div class="cnt">'+(idx+1)+' / '+view.length+'</div>'+
      '</div>'+
    '</div>';

  document.getElementById("card").addEventListener("click", onTap);
  const tb = document.getElementById("tapbtn");
  tb.textContent = tapLabel;
  tb.classList.toggle("last", last);
  prevBtn.disabled = (idx<=0 && beat<=0);
  nextBtn.disabled = (idx>=view.length-1);
}

// タップ＝次の拍。最後の拍なら次の札へ。
function onTap(){
  const c = view[idx];
  const bs = beatsOf(c);
  if(beat < bs.length-1){ beat++; }
  else if(idx < view.length-1){ idx++; beat=0; }
  else { randomCard(); return; }   // 最後まで来たら、もう一枚ひく
  render();
}
function nextCard(){ if(idx<view.length-1){ idx++; beat=0; render(); } }
function prevCard(){ if(beat>0){ beat=0; render(); } else if(idx>0){ idx--; beat=0; render(); } }
function randomCard(){ if(view.length){ idx=Math.floor(Math.random()*view.length); beat=0; render(); } }

function applyFilter(){
  view = ALL.filter(c => {
    const catOk = !activeCat || c.category===activeCat;
    const blob = [c.title,c.scene,c.category,c.toi,c.mikata,c.kizuki,c.hitokoto,(c.topics||[]).join(" ")].join(" ").toLowerCase();
    const qOk = !query || blob.includes(query.toLowerCase());
    return catOk && qOk;
  });
  idx = 0; beat = 0;
  renderTags(); render();
}

prevBtn.onclick = prevCard;
nextBtn.onclick = nextCard;
document.getElementById("tapbtn").onclick = onTap;
document.getElementById("dice").onclick = randomCard;
document.getElementById("search").addEventListener("input", e=>{ query=e.target.value; applyFilter(); });
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowRight") nextCard();
  else if(e.key==="ArrowLeft") prevCard();
  else if(e.key===" "||e.key==="ArrowDown"||e.key==="Enter"){ e.preventDefault(); onTap(); }
});

// スワイプ（左右で札を移動）。スワイプ時はタップ扱いしない。
let sx=null, sy=null, swiped=false;
document.addEventListener("touchstart", e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; swiped=false; }, {passive:true});
document.addEventListener("touchend", e=>{
  if(sx===null) return;
  const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)){ swiped=true; if(dx<0) nextCard(); else prevCard(); }
  sx=sy=null;
}, {passive:true});
// スワイプ直後のクリックを無効化
document.addEventListener("click", e=>{ if(swiped){ swiped=false; e.stopPropagation(); } }, true);

// 起動：renderタグ→「今日の一枚」でランダムスタート
if(!ALL.length){
  slot.innerHTML='<div class="card"><div class="empty">カードがまだ読み込めていません。<br>このフォルダで <b>python3 build.py</b> を一度実行してください。</div></div>';
}else{
  renderTags();
  idx = Math.floor(Math.random()*view.length); beat = 0;  // 開くたびに今日の一枚
  render();
}
</script>
</body>
</html>
