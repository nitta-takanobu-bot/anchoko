<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="robots" content="noindex,nofollow">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="あんちょこ">
  <meta name="theme-color" content="#6b4f3a">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>考えのあんちょこ</title>
<script>
window.CARDS = [
  {
    "title": "灯台は船を追わない",
    "category": "お布施・お寺のかたち",
    "scene": "お寺と集客・お布施・お寺の役割の話のとき",
    "duration": "2分",
    "source": "raw/2026-06-09_寄合_灯台は船を追わない.md",
    "topics": [
      "お布施",
      "お寺の役割",
      "即非"
    ],
    "furi": "「お寺も、もっと宣伝して人を集めたほうがいいんじゃないか」——そんな声を、ときどき聞きます。",
    "ochi": "灯台は、光を強くして「ここにいるよ」と見つけやすく立っています。それはいいことです。けれど、もし灯台が船を追いかけて港を出てしまったら、それはもう灯台ではありません。お寺も同じで、来ていただく工夫はしても、追いかけた瞬間に、布施の心が営業の匂いに変わってしまう。",
    "tsukkomi": "「灯台まではOK、追いかけたらアウト」。線は、ちゃんとそこに引かれているんですね。",
    "point": "来てもらう工夫はよし。けれど追いかけた瞬間、布施の心が営業に変わる。",
    "file": "0001_灯台は船を追わない.md"
  },
  {
    "title": "赦すと罰するは、実は同じ",
    "category": "仏教思想（ものの見方）",
    "scene": "ゆるし・後悔・人を責める気持ちの話のとき",
    "duration": "2分",
    "source": "お手紙掲示板 R5-6",
    "topics": [
      "ゆるし",
      "善悪",
      "ことば"
    ],
    "furi": "「赦す」と「罰する」。正反対の言葉に聞こえます。",
    "ochi": "でも、どちらも「ひとつのことを終わらせる」という働きでは同じなんです。罰を与えて終わらせるのか、赦して終わらせるのか。終わらせ方が違うだけ。",
    "tsukkomi": "いつまでもミスを背負わせ続ける——それは罰でも赦しでもなく、ただ「終わらせない」こと。終わらせない社会は、誰にとってもしんどいのです。",
    "point": "赦すも罰するも「終わらせる」こと。一番つらいのは、終わらせないこと。",
    "file": "0002_赦すと罰するは同じ.md"
  },
  {
    "title": "布施は「出す人」の修行",
    "category": "お布施・お寺のかたち",
    "scene": "お布施の意味を聞かれたとき・法事の前後",
    "duration": "2分",
    "source": "raw/2026-06-10_寄合_お布施という行.md",
    "topics": [
      "お布施",
      "修行",
      "執着"
    ],
    "furi": "「お布施って、いくら包めばいいんですか」と、よく聞かれます。",
    "ochi": "値段でお答えすると、布施という\"行\"が、ただの代金に格下げされてしまう。布施はもともと、こちらが何かを手放す——執着をゆるめる修行のほうなんです。受け取る側の値付けではなく、出す側の心のけいこ。",
    "tsukkomi": "「お気持ちで」と言うのは、もったいぶっているのではなく、あなたの修行の場を取り上げないため、なのかもしれません。",
    "point": "布施は値段ではなく、出す側の心のけいこ。だから「お気持ちで」。",
    "file": "0003_布施は出す人の修行.md"
  },
  {
    "title": "「お互いさま」は縁起のこと",
    "category": "ご縁・人とのあいだ",
    "scene": "助け合い・ご縁・支え合いの話のとき",
    "duration": "2分",
    "source": "お手紙掲示板 R5-3",
    "topics": [
      "縁起",
      "つながり",
      "ことば"
    ],
    "furi": "困っている人に手を貸して、「いいんですよ、お互いさまですから」と言う。よく耳にする一言です。",
    "ochi": "この「お互いさま」、実は仏教の縁起そのものなんです。すべては互いに支え合って成り立っている。私が今こうしていられるのも、まわりのみなさんのおかげ。",
    "tsukkomi": "「お互いさま」は、貸し借りの計算じゃない。いつか返ってくるから、ではなく、もう最初から繋がっているから、なんですね。",
    "point": "お互いさまは計算じゃない。もう最初から繋がっている、ということ。",
    "file": "0004_お互いさまは縁起.md"
  },
  {
    "title": "手放す、ゆえに続く",
    "category": "仏教思想（ものの見方）",
    "scene": "大切な人を亡くした方へ・グリーフの話のとき",
    "duration": "3分",
    "source": "raw/2026-05-31_寄合_続ける絆と手放す執着.md",
    "topics": [
      "グリーフ",
      "執着",
      "即非"
    ],
    "furi": "大切な人を亡くしたとき、「執着を手放しなさい」と言われると、突き放されたように感じませんか。",
    "ochi": "でも、手放すことと、絆が続くことは、対立しません。握りしめていた「所有」の手をゆるめると、それは「見守り」や「関係」に姿を変えて、続いていく。形を変えて、ちゃんと残るんです。",
    "tsukkomi": "手放すのは、忘れることじゃない。持ち方を、変えることなんですね。",
    "point": "手放すは忘れることではなく、持ち方を変えること。絆は形を変えて続く。",
    "file": "0005_手放すゆえに続く.md"
  },
  {
    "title": "八風吹けども動ぜず",
    "category": "仏教思想（ものの見方）",
    "scene": "心が揺れるとき・経営とグリーフをつなぐ話",
    "duration": "3分",
    "source": "raw/2026-05-31_八風で読む運営とグリーフ_頭の中の言葉.md",
    "topics": [
      "八風",
      "こころ",
      "脚下照顧"
    ],
    "furi": "商売がうまくいかない、大事なものを失った——心が、ぐらりと揺れる。",
    "ochi": "仏教では、人を揺さぶる八つの風（八風）を説きます。得と失、誉れと謗り……。面白いのは、経営の悩みも、大切な人を失った悲しみも、根は同じ「失う風」への揺れだということ。",
    "tsukkomi": "風を止めることはできません。でも、風で動かない場所に立てたとき、はじめて、同じ風に揺れている人の隣に座れるんです。",
    "point": "風は止められない。動じない場所に立てたとき、隣に座れる。",
    "file": "0006_八風吹けども動ぜず.md"
  },
  {
    "title": "握る名と、送る名",
    "category": "ご縁・人とのあいだ",
    "scene": "名前・呼び名・法名・ブランドの話のとき",
    "duration": "2分",
    "source": "raw/2026-06-08_寄合_握る名と送る名.md",
    "topics": [
      "名づけ",
      "法名",
      "即非",
      "手放す"
    ],
    "furi": "名前をつける、というのは、自分のものにすること、囲い込むこと――そんなふうに感じることはありませんか。",
    "ochi": "じつは「名づけ」には、正反対の二つの向きがあります。商標やブランドの名は「名づける、ゆえに握る」――意味を一点に固定し、ほかの人を締め出して、自分のものとして確保する名です。いっぽう、亡き方に差し上げる法名は「名づける、ゆえに手放す」――その方へ贈り、所有を手放して、意味を未来へ開いていく名。同じ「名づけ」でも、握る名と、送る名は、向きが逆なのです。",
    "tsukkomi": "握る名は囲い込み、送る名は手放す。お寺は、その二つを取り違えない番人なのかもしれません。",
    "point": "名づけには〈握る〉と〈送る〉の二つの向きがある。看板や道具は握ってよい。けれど、その人そのものは、握らず送る。",
    "file": "0007_握る名と送る名.md"
  },
  {
    "title": "固めるな、めくり続けよ",
    "category": "かなしみ・グリーフ",
    "scene": "大切な人やものを手放せないとき・形見や仏壇の話のとき",
    "duration": "2分",
    "source": "raw/2026-06-03_寄合_固めるな めくり続けよ.md",
    "topics": [
      "手放す",
      "続く絆",
      "日めくり",
      "無常"
    ],
    "furi": "「もう手放しなさい」と言われる。でも、手放したくない。――大切な人やものほど、この板挟みに立たされますね。",
    "ochi": "台所の日めくりカレンダーを思い浮かべてください。毎朝めくる、あの所作。あれは「手放せない」のではありません。毎朝めくることで、故人への思いを\"今日のかたち\"に置き直しているのです。固めて握りしめるのでもなく、忘れて捨てるのでもなく、毎日めくって更新している。手放すべきは「物」ではなく、「固めてしまうこと」のほうなのですね。",
    "tsukkomi": "固めるな、めくり続けよ。――糊で固めず、毎朝めくる。それなら、絆はちゃんと続きます。",
    "point": "手放す/手放さないの二択ではない。固めずに、めくり続ける。関係は、更新しながら続いていく。",
    "file": "0008_固めるなめくり続けよ.md"
  },
  {
    "title": "エントロピーと無常",
    "category": "科学・別の視点",
    "scene": "無常・移ろい・諸行無常を科学の言葉で話すとき",
    "duration": "2分",
    "source": "熱力学第二法則（エントロピー増大）＋仏教「諸行無常」",
    "topics": [
      "無常",
      "科学",
      "エントロピー",
      "移ろい"
    ],
    "furi": "部屋は、放っておくと散らかる。熱いお茶は、必ずさめる。ひとりでに元へ戻ることは、ありません。なぜでしょう。",
    "ochi": "物理に「エントロピー（乱雑さ）」という考えがあります。世界はほうっておくと、必ず\"バラける\"方向にしか進まない――これが熱力学第二法則です。崩れない城も、さめないお茶も、この世にはない。…これ、お釈迦さまが二千五百年前に言った「諸行無常（あらゆるものは移ろう）」と、同じことを指しているように見えませんか。",
    "tsukkomi": "科学は「そういう法則だ」と淡々と告げ、仏教は「だからこそ、今がいとおしい」と受け取る。同じ移ろいを、どう生きるか。",
    "point": "すべては移ろう――科学も仏教も、そこは同じ。違うのは、その移ろいを\"嘆く\"か、\"慈しむ\"か。",
    "file": "0009_エントロピーと無常.md"
  }
];
window.CARDS_BUILT = "2026-06-11";
</script>
<style>
  :root{
    --paper:#f7f4ec; --ink:#2b2b2b; --sub:#7a6f60;
    --brown:#6b4f3a; --line:#d8cfbe; --accent:#9c6b43;
    --furi:#3a6b4f; --ochi:#9c6b43; --tsukkomi:#8a5a6b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:"Hiragino Mincho ProN","Hiragino Mincho Pro",serif;
    background:var(--paper); color:var(--ink);
    display:flex; flex-direction:column; min-height:100vh;
  }
  header{
    padding:16px 20px 10px; border-bottom:1px solid var(--line);
    display:flex; flex-wrap:wrap; gap:10px 16px; align-items:center;
  }
  header h1{
    font-size:20px; margin:0; letter-spacing:.08em; color:var(--brown);
    font-weight:600; white-space:nowrap;
  }
  header h1 small{font-size:12px;color:var(--sub);font-weight:400;margin-left:8px;letter-spacing:.02em}
  .search{
    flex:1; min-width:160px; max-width:360px;
    border:1px solid var(--line); border-radius:20px; padding:6px 14px;
    font-size:14px; background:#fff; color:var(--ink);
    font-family:inherit;
  }
  .tags{display:flex; flex-wrap:wrap; gap:6px; width:100%}
  .tag{
    font-size:12px; padding:3px 11px; border-radius:14px; cursor:pointer;
    border:1px solid var(--line); background:#fff; color:var(--sub);
    font-family:inherit;
  }
  .tag.on{background:var(--brown); color:#fff; border-color:var(--brown)}

  main{flex:1; display:flex; align-items:flex-start; justify-content:center; padding:20px 14px}
  .stage{width:100%; max-width:900px; display:flex; align-items:flex-start; gap:10px}

  .nav{
    flex:0 0 auto; width:44px; height:44px; border-radius:50%;
    border:1px solid var(--line); background:#fff; color:var(--brown);
    font-size:20px; cursor:pointer; line-height:1;
  }
  .nav:hover{background:var(--brown);color:#fff}
  .nav:disabled{opacity:.3; cursor:default; background:#fff; color:var(--brown)}

  .card{
    flex:1; background:#fff; border:1px solid var(--line);
    border-radius:14px; box-shadow:0 6px 22px rgba(80,60,40,.10);
    padding:24px 28px 20px; min-height:0;
    display:flex; flex-direction:column;
    animation:flip .28s ease;
  }
  @keyframes flip{from{opacity:0; transform:translateY(8px) rotateX(6deg)}to{opacity:1; transform:none}}

  .card .meta{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:6px}
  .card .cat{font-size:12px; font-weight:600; color:#fff; background:var(--brown); border-radius:11px; padding:2px 11px}
  .card .scene{font-size:12.5px; color:var(--accent)}
  .card .dur{font-size:12px; color:var(--sub); border:1px solid var(--line); border-radius:10px; padding:1px 8px}
  .card h2{
    font-size:24px; margin:4px 0 18px; color:var(--ink);
    letter-spacing:.04em; line-height:1.4;
  }
  .seg{margin:0 0 13px; padding-left:14px; border-left:3px solid var(--line)}
  .seg .lbl{font-size:12.5px; letter-spacing:.1em; font-weight:600; display:block; margin-bottom:3px}
  .seg p{margin:0; font-size:16px; line-height:1.85}
  .seg.furi{border-color:var(--furi)} .seg.furi .lbl{color:var(--furi)}
  .seg.ochi{border-color:var(--ochi)} .seg.ochi .lbl{color:var(--ochi)}
  .seg.tsukkomi{border-color:var(--tsukkomi)} .seg.tsukkomi .lbl{color:var(--tsukkomi)}

  /* ポイント＝この話の芯（4つ目・まとめ枠） */
  .point{margin:4px 0 6px; padding:13px 16px; background:#f1ebdd;
    border:1px solid #e3d8c3; border-radius:10px}
  .point .lbl{font-size:12.5px; letter-spacing:.1em; font-weight:700;
    color:var(--brown); display:block; margin-bottom:4px}
  .point p{margin:0; font-size:15.5px; line-height:1.8; color:#3a3127}

  .card .foot{
    margin-top:auto; padding-top:14px; border-top:1px dashed var(--line);
    display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;
    font-size:11.5px; color:var(--sub);
  }
  .card .cardtags{display:flex; gap:6px; flex-wrap:wrap}
  .card .cardtags span{color:var(--accent)}

  footer{
    text-align:center; padding:12px; font-size:12px; color:var(--sub);
    border-top:1px solid var(--line);
  }
  footer .count{color:var(--brown); font-weight:600}
  .empty{color:var(--sub); text-align:center; padding:60px 20px; font-size:15px}
  .hint{font-size:11px;color:var(--sub);margin-top:4px}
</style>
</head>
<body>
<header>
  <h1>考えのあんちょこ<small>仏教思想と、いろんな視点</small></h1>
  <input class="search" id="search" placeholder="ことばで探す（例：無常）" autocomplete="off">
  <div class="tags" id="tags"></div>
</header>

<main>
  <div class="stage">
    <button class="nav" id="prev" title="前へ（←）">‹</button>
    <div id="slot" style="flex:1"></div>
    <button class="nav" id="next" title="次へ（→）">›</button>
  </div>
</main>

<footer>
  <span id="counter"></span>
  <div class="hint">← → キーでめくれます　／　ネタを足したら build.py を一度実行</div>
</footer>

<script>
const ALL = window.CARDS || [];
const BUILT = window.CARDS_BUILT || "";
let view = ALL.slice();
let idx = 0;
let activeCat = null;
let query = "";

const slot = document.getElementById("slot");
const counter = document.getElementById("counter");
const prevBtn = document.getElementById("prev");
const nextBtn = document.getElementById("next");

function allCats(){
  const s = new Set();
  ALL.forEach(c => { if(c.category) s.add(c.category); });
  return [...s];
}

function renderTags(){
  const box = document.getElementById("tags");
  box.innerHTML = "";
  allCats().forEach(t => {
    const el = document.createElement("span");
    el.className = "tag" + (activeCat===t ? " on":"");
    el.textContent = t;
    el.onclick = () => { activeCat = (activeCat===t)?null:t; applyFilter(); };
    box.appendChild(el);
  });
}

function applyFilter(){
  view = ALL.filter(c => {
    const tagOk = !activeCat || c.category===activeCat;
    const blob = [c.title,c.scene,c.category,c.furi,c.ochi,c.tsukkomi,c.point,(c.topics||[]).join(" ")].join(" ").toLowerCase();
    const qOk = !query || blob.includes(query.toLowerCase());
    return tagOk && qOk;
  });
  idx = 0;
  renderTags();
  render();
}

function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function render(){
  if(!view.length){
    slot.innerHTML = '<div class="empty">そのことばのネタは、まだありません。<br>別のことばで探すか、新しいカードを足してみてください。</div>';
    counter.textContent = "";
    prevBtn.disabled = nextBtn.disabled = true;
    return;
  }
  if(idx<0) idx=0;
  if(idx>=view.length) idx=view.length-1;
  const c = view[idx];
  const tagHtml = (c.topics||[]).map(t=>'<span>#'+esc(t)+'</span>').join(" ");
  slot.innerHTML =
    '<div class="card">'+
      '<div class="meta">'+
        (c.category?'<span class="cat">'+esc(c.category)+'</span>':'')+
        (c.scene?'<span class="scene">🗣 '+esc(c.scene)+'</span>':'')+
        (c.duration?'<span class="dur">'+esc(c.duration)+'</span>':'')+
      '</div>'+
      '<h2>'+esc(c.title)+'</h2>'+
      seg("furi","ふり",c.furi)+
      seg("ochi","おち",c.ochi)+
      seg("tsukkomi","つっこみ",c.tsukkomi)+
      (c.point?'<div class="point"><span class="lbl">◆ ポイント（この話の芯）</span><p>'+esc(c.point).replace(/\n/g,"<br>")+'</p></div>':'')+
      '<div class="foot">'+
        '<div class="cardtags">'+tagHtml+'</div>'+
        (c.source?'<div>出典：'+esc(c.source)+'</div>':'')+
      '</div>'+
    '</div>';
  counter.innerHTML = '<span class="count">'+(idx+1)+'</span> / '+view.length+' 枚'+
    (BUILT?'　（更新 '+BUILT+'）':'');
  prevBtn.disabled = idx<=0;
  nextBtn.disabled = idx>=view.length-1;
}

function seg(cls,label,txt){
  if(!txt) return "";
  return '<div class="seg '+cls+'"><span class="lbl">'+label+'</span><p>'+esc(txt).replace(/\n/g,"<br>")+'</p></div>';
}

function go(d){ idx+=d; render(); }

prevBtn.onclick=()=>go(-1);
nextBtn.onclick=()=>go(1);
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") go(-1);
  if(e.key==="ArrowRight") go(1);
});
document.getElementById("search").addEventListener("input",e=>{query=e.target.value;applyFilter();});

// swipe
let sx=null;
document.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;},{passive:true});
document.addEventListener("touchend",e=>{
  if(sx===null) return;
  const dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)>50) go(dx<0?1:-1);
  sx=null;
},{passive:true});

if(!ALL.length){
  slot.innerHTML='<div class="empty">カードがまだ読み込めていません。<br>このフォルダで <b>python3 build.py</b> を一度実行してください。</div>';
}else{
  renderTags(); render();
}
</script>
</body>
</html>
